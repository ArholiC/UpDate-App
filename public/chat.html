<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpDate - Sohbet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0b0914; color: white; margin: 0; overflow: hidden; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 450px; height: 100vh; display: flex; flex-direction: column; background: rgba(255,255,255,0.02); position: relative; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); }
        .header { padding: 15px; background: #16142b; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; }
        .header-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1.5px solid #ff4b4b; display: none; }
        #message-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 90px; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: linear-gradient(45deg, #ff416c, #ff4b2b); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: rgba(255, 255, 255, 0.1); border-bottom-left-radius: 4px; }
        .time { font-size: 9px; opacity: 0.6; display: block; text-align: right; margin-top: 4px; }
        .input-area { position: fixed; bottom: 0; width: 100%; max-width: 450px; padding: 15px; background: #16142b; display: flex; gap: 10px; box-sizing: border-box; }
        input { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; padding: 10px 20px; color: white; outline: none; }
        button { background: #ff4b4b; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">
        <a href="messages.html" style="color:white; text-decoration:none; font-size:24px;">‹</a>
        <img id="chatAvatar" class="header-avatar">
        <a href="#" id="chatTitle" style="font-weight:600; color:white; text-decoration:none;">Yükleniyor...</a>
    </div>
    <div id="message-area"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Mesaj yaz..." autocomplete="off">
        <button onclick="mesajGonder()">🚀</button>
    </div>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    const hedefID = params.get('id');
    const benimID = localStorage.getItem('loggedInUserId');

    async function yukle() {
        const res = await fetch(`http://localhost:5000/api/messages/${benimID}/${hedefID}`);
        const data = await res.json();
        const area = document.getElementById('message-area');
        area.innerHTML = data.map(m => {
            const saat = new Date(m.sent_at).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            return `<div class="msg ${m.sender_id == benimID ? 'sent' : 'received'}">${m.message_text}<span class="time">${saat}</span></div>`;
        }).join('');
        area.scrollTop = area.scrollHeight;
    }

    async function mesajGonder() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim()) return;
        await fetch('http://localhost:5000/api/messages', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ sender_id: benimID, receiver_id: hedefID, message_text: input.value })
        });
        input.value = ''; yukle();
    }

    fetch(`http://localhost:5000/api/users/${hedefID}`).then(r => r.json()).then(u => {
        document.getElementById('chatTitle').innerText = u.full_name;
        // user-details.html olarak güncellendi
        document.getElementById('chatTitle').href = `user-details.html?id=${u.id}`;
        if(u.profile_pic) {
            const img = document.getElementById('chatAvatar');
            img.src = `http://localhost:5000${u.profile_pic}`;
            img.style.display = 'block';
        }
    });

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') mesajGonder(); });
    setInterval(yukle, 2000); yukle();
</script>
</body>
</html>
