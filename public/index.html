<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpDate - Algoritmik Eşleşme</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center">

    <nav class="fixed top-0 w-full bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-rose-500">UpDate</h1>
        <div class="space-x-4">
            <button class="text-gray-600">Profil</button>
            <button class="text-gray-600 font-bold text-rose-500">Eşleşmeler</button>
        </div>
    </nav>

    <div class="relative w-80 h-[500px] bg-white rounded-2xl shadow-2xl overflow-hidden border-4 border-white mt-16">
        <img src="https://via.placeholder.com/400x600" alt="Profil" class="w-full h-full object-cover">
        
        <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-black to-transparent text-white">
            <h2 class="text-2xl font-bold">Muhammed, 21</h2>
            <p class="text-sm opacity-80">Yazılım, Resim, Gaming</p>
        </div>
    </div>

    <div class="flex space-x-8 mt-8">
    <button id="dislikeBtn" class="bg-white p-4 rounded-full shadow-lg hover:scale-110 transition text-red-500 text-2xl">✖</button>
    <button id="likeBtn" class="bg-white p-4 rounded-full shadow-lg hover:scale-110 transition text-green-500 text-2xl">❤</button>
</div>

</body>
</html>
