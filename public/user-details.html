<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UpDate - Profil Detayları</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0b0914; color: white; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; overflow-x: hidden; position: relative;
        }

        /* DİĞER SAYFALARLA AYNI NEBULA EFEKTİ */
        body::before {
            content: ""; position: absolute; width: 500px; height: 500px;
            border-radius: 50%; background: linear-gradient(45deg, #ff416c, #ff4b2b);
            filter: blur(100px); opacity: 0.12; z-index: -1; top: 10%; left: 10%;
        }

        .container { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 40px; 
            width: 420px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.7); 
        }

        .detay-foto { 
            width: 150px; height: 150px; border-radius: 50%; 
            object-fit: cover; margin-bottom: 20px;
            border: 4px solid #ff4b4b; box-shadow: 0 10px 25px rgba(255, 75, 75, 0.3);
        }

        h2 { font-size: 32px; font-weight: 800; margin-bottom: 5px; }
        .yas-burc { color: #888; font-size: 16px; margin-bottom: 20px; }
        
        /* UYUM YÜZDESİ DAİRESİ */
        .uyum-kutusu { margin: 25px 0; }
        .uyum-yuzdesi {
            font-size: 48px; font-weight: 800; color: #76c87b;
            text-shadow: 0 0 20px rgba(118, 200, 123, 0.4);
        }
        .uyum-etiket { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        .biyo { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; font-size: 14px; line-height: 1.6; color: #ccc; margin-bottom: 25px; }

        .hobi-etiketi { text-align: left; font-size: 12px; color: #888; margin-bottom: 10px; font-weight: 600; }
        .hobi-kapsayici { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .hobi { background: rgba(255,255,255,0.08); padding: 8px 15px; border-radius: 50px; font-size: 12px; }

        .btn-don { 
            display: block; margin-top: 30px; padding: 15px; 
            background: rgba(255,255,255,0.05); color: white; text-decoration: none;
            border-radius: 20px; font-weight: 700; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-don:hover { background: #ff4b4b; border-color: #ff4b4b; }
    </style>
</head>
<body>

<div class="container" id="detayPaneli">
    <img src="" id="userFoto" class="detay-foto">
    <h2 id="userName">Yükleniyor...</h2>
    <div class="yas-burc" id="userYasBurc">...</div>

    <div class="uyum-kutusu">
        <div class="uyum-etiket">Hobilerinize Göre Uyumunuz</div>
        <div class="uyum-yuzdesi" id="uyumYuzdesi">%0</div>
    </div>

    <div class="biyo" id="userBio">...</div>

    <div class="hobi-etiketi">Ortak İlgi Alanları</div>
    <div class="hobi-kapsayici" id="ortakHobiler"></div>

    <a href="index.html" class="btn-don">← Geri Dön</a>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const hedefID = params.get('id');
    const benimID = localStorage.getItem('loggedInUserId');

    async function detaylariGetir() {
        try {
            // 1. Hedef Kullanıcıyı Getir
            const res1 = await fetch(`http://localhost:5000/api/users/${hedefID}`);
            const hedefUser = await res1.json();

            // 2. Kendi Bilgilerimi Getir (Uyum hesaplamak için)
            const res2 = await fetch(`http://localhost:5000/api/users/${benimID}`);
            const ben = await res2.json();

            // Verileri Bas
            document.getElementById('userName').innerText = hedefUser.full_name;
            document.getElementById('userFoto').src = hedefUser.profile_pic ? `http://localhost:5000${hedefUser.profile_pic}` : 'https://via.placeholder.com/150?text=👤';
            document.getElementById('userBio').innerText = hedefUser.bio || "Biyografi yok.";

            let yas = new Date().getFullYear() - new Date(hedefUser.birth_date).getFullYear();
            document.getElementById('userYasBurc').innerText = `${yas} Yaşında • ${hedefUser.zodiac}`;

            // UYUM HESAPLAMA (HOBİLER ÜZERİNDEN)
            const hedefHobiler = hedefUser.interests || [];
            const benimHobiler = ben.interests || [];
            
            const ortak = hedefHobiler.filter(h => benimHobiler.includes(h));
            const ortakHobiDiv = document.getElementById('ortakHobiler');
            
            if(ortak.length > 0) {
                ortakHobiDiv.innerHTML = ortak.map(h => `<div class="hobi">${h}</div>`).join('');
            } else {
                ortakHobiDiv.innerHTML = '<div style="font-size:12px; color:#555">Ortak hobi bulunamadı.</div>';
            }

            // Yüzde Hesapla (Basit mantık: Her ortak hobi %20, max %100)
            let yuzde = Math.min(ortak.length * 25, 100);
            if (yuzde === 0) yuzde = Math.floor(Math.random() * 20) + 10; // Hiç yoksa bile şans verelim :)
            
            document.getElementById('uyumYuzdesi').innerText = `%${yuzde}`;

        } catch (error) {
            console.error("Hata:", error);
        }
    }

    detaylariGetir();
</script>
</body>
</html>
