<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpDate - Mesajlar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Poppins', sans-serif; background: #0b0914; color: white; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; position: relative;
        }

        /* ARKA PLAN */
        body::before {
            content: ""; position: absolute; width: 600px; height: 600px;
            border-radius: 50%; background: linear-gradient(45deg, #6a11cb, #2575fc);
            filter: blur(120px); opacity: 0.1; z-index: -1;
        }

        .container { 
            width: 750px; height: 85vh; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(35px); 
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); position: relative;
            display: flex; flex-direction: column; padding: 50px; box-sizing: border-box;
        }

        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .title { font-size: 38px; font-weight: 800; background: linear-gradient(to right, #ff416c, #ff4b2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .match-badge { background: rgba(255, 75, 75, 0.2); color: #ff4b4b; padding: 8px 20px; border-radius: 50px; font-weight: 600; font-size: 14px; }

        .chat-list { flex: 1; overflow-y: auto; padding-right: 15px; margin-bottom: 60px; }
        .chat-list::-webkit-scrollbar { width: 6px; }
        .chat-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .chat-item { 
            display: flex; align-items: center; gap: 20px; padding: 25px; 
            background: rgba(255, 255, 255, 0.03); border-radius: 35px; 
            text-decoration: none; color: white; margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .chat-item:hover { 
            transform: scale(1.02) translateY(-5px); 
            background: rgba(255, 255, 255, 0.07); 
            border-color: #ff4b4b; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .avatar-wrapper { position: relative; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #ff4b4b; box-shadow: 0 5px 15px rgba(255, 75, 75, 0.2); }
        .status-dot { position: absolute; bottom: 5px; right: 5px; width: 15px; height: 15px; background: #4caf50; border: 3px solid #1c1c2e; border-radius: 50%; }

        .chat-info { flex: 1; }
        .name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .name { font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }
        .time { font-size: 12px; color: #666; }
        .preview { font-size: 14px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 350px; }

        /* NAVBAR */
        .navbar { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: rgba(22, 20, 43, 0.8); display: flex; justify-content: space-around; 
            padding: 20px 0; border-top: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 0 0 50px 50px; backdrop-filter: blur(15px);
        }
        .nav-link { color: #555; text-decoration: none; font-size: 13px; font-weight: 600; text-align: center; transition: 0.3s; }
        .nav-link.active { color: #ff4b4b; }
        .nav-icon { display: block; font-size: 26px; margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-area">
        <h1 class="title">Mesajlar</h1>
        <div class="match-badge" id="matchBadge">0 Eşleşme</div>
    </div>

    <div class="chat-list" id="chatList">
        <div style="text-align:center; color:#444; margin-top:100px;">Yükleniyor...</div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-link"><span class="nav-icon">🔥</span>Keşfet</a>
        <a href="messages.html" class="nav-link active"><span class="nav-icon">💬</span>Mesajlar</a>
        <a href="profile.html" class="nav-link"><span class="nav-icon">👤</span>Profil</a>
    </nav>
</div>

<script>
    const benimID = localStorage.getItem('loggedInUserId');
    if(!benimID) window.location.href = 'login.html';

    async function listeyiYukle() {
        try {
            const res = await fetch(`http://localhost:5000/api/matches/${benimID}`);
            const veriler = await res.json();
            
            document.getElementById('matchBadge').innerText = `${veriler.length} Eşleşme`;
            
            const listContainer = document.getElementById('chatList');
            if(veriler.length === 0) {
                listContainer.innerHTML = `
                    <div style="text-align:center; margin-top:80px;">
                        <div style="font-size:50px; margin-bottom:20px;">🏜️</div>
                        <p style="color:#666; font-size:18px;">Henüz kimseyle eşleşmedin.<br>Keşfet'e dönüp şansını dene!</p>
                        <a href="index.html" style="color:#ff4b4b; text-decoration:none; font-weight:700;">Hemen Keşfet →</a>
                    </div>`;
                return;
            }

            listContainer.innerHTML = veriler.map(kisi => `
                <a href="chat.html?id=${kisi.id}" class="chat-item">
                    <div class="avatar-wrapper">
                        <img src="${kisi.profile_pic ? 'http://localhost:5000'+kisi.profile_pic : 'https://via.placeholder.com/80'}" class="avatar">
                        <div class="status-dot"></div>
                    </div>
                    <div class="chat-info">
                        <div class="name-row">
                            <div class="name">${kisi.full_name}</div>
                            <div class="time">Şimdi</div>
                        </div>
                        <div class="preview">${kisi.bio || 'Sohbete başlamak için harika bir gün! ✨'}</div>
                    </div>
                </a>
            `).join('');
        } catch (err) {
            console.error("Liste yükleme hatası:", err);
        }
    }

    listeyiYukle();
    // Her 10 saniyede bir yeni eşleşme var mı diye kontrol et
    setInterval(listeyiYukle, 10000);
</script>
</body>
</html>
