<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UpDate - Aramıza Katıl</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { 
            font-family: 'Poppins', sans-serif; background: #0b0914; color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden; position: relative;
        }

        /* NEBULA BACK */
        body::before, body::after {
            content: ""; position: absolute; width: 500px; height: 500px;
            border-radius: 50%; background: linear-gradient(45deg, #ff416c, #ff4b2b);
            filter: blur(100px); opacity: 0.12; z-index: -1; animation: float 15s infinite alternate;
        }
        body::after { background: linear-gradient(45deg, #007bff, #00d2ff); bottom: -150px; right: -150px; }
        @keyframes float { 100% { transform: translate(60px, 60px) scale(1.1); } }

        .container { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 45px; border-radius: 40px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.7); width: 380px; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center;
        }
        .container.wide { width: 650px; }

        .logo { font-size: 42px; font-weight: 800; margin-bottom: 30px; background: linear-gradient(to right, #ff416c, #ff4b2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        input, select { 
            width: 100%; padding: 16px; margin: 10px 0; background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; color: white; outline: none; font-family: inherit;
            box-sizing: border-box;
        }

        /* CİNSİYET SEÇİMİ DÜZELTME */
        select option {
            background: #1a1a2e; /* Seçeneklerin arka planı karanlık */
            color: white;
        }

        .question-card { display: none; text-align: left; animation: fadeIn 0.5s; }
        .question-card.active { display: block; }
        .q-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #ff4b4b; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px; border-radius: 20px; color: white; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .opt-btn.selected { background: rgba(255, 65, 108, 0.2); border-color: #ff416c; color: #ff416c; }

        button.main-btn { 
            width: 100%; padding: 18px; background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 17px; font-weight: 700; margin-top: 25px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container" id="mainBox">
    <div class="logo">UpDate</div>

    <div id="loginStep">
        <input type="email" id="lEmail" placeholder="E-posta">
        <input type="password" id="lPass" placeholder="Şifre">
        <button class="main-btn" onclick="login()">Giriş Yap</button>
        <p style="cursor:pointer; color:#888; font-size:14px; margin-top:20px;" onclick="toRegister()">Hesabın yok mu? Kayıt Ol</p>
    </div>

    <div id="regStep1" style="display: none;">
        <input type="text" id="rName" placeholder="Ad Soyad">
        <input type="email" id="rEmail" placeholder="E-posta">
        <input type="password" id="rPass" placeholder="Şifre">
        <select id="rGender">
            <option value="" disabled selected>Cinsiyet Seçiniz</option>
            <option value="kadin">Kadın</option>
            <option value="erkek">Erkek</option>
        </select>
        <input type="date" id="rBirth">
        <button class="main-btn" onclick="toTest()">Testi Çöz ve Devam Et →</button>
    </div>

    <div id="regStep2" style="display: none;">
        <div id="testArea"></div>
        <button class="main-btn" id="finishBtn" style="display:none;" onclick="completeRegister()">Hesabımı Oluştur 🚀</button>
    </div>
</div>

<script>
    let currentQ = 0;
    let answers = {};
    const questions = [
        { id: "music", q: "Hangi müzik tarzı seni anlatır?", opts: ["Rock", "Pop", "Rap", "Klasik"] },
        { id: "food", q: "İlk buluşmada ne yerdiniz?", opts: ["Pizza/Burger", "Sushi", "Kebap", "Ev Yemekleri"] },
        { id: "movie", q: "Film tercihin hangisi?", opts: ["Korku", "Bilim Kurgu", "Romantik", "Komedi"] },
        { id: "hobby", q: "Hafta sonu planın?", opts: ["Kamp/Doğa", "Gaming", "Parti", "Kitap/Huzur"] },
        { id: "travel", q: "Hayalindeki tatil?", opts: ["Avrupa Turu", "Maldivler", "Kuzey Işıkları", "Kapadokya"] },
        { id: "pet", q: "Hangi hayvanla daha iyi anlaşırsın?", opts: ["Kedi", "Köpek", "Kuş", "Beslemem"] },
        { id: "drink", q: "En sevdiğin içecek?", opts: ["Kahve", "Çay", "Kokteyl", "Su/Soda"] },
        { id: "style", q: "Giyim tarzın?", opts: ["Spor", "Klasik", "Bohem", "Sokak Stili"] },
        { id: "sport", q: "Sporla aran nasıl?", opts: ["Fanatiğim", "Arada yaparım", "Sadece izlerim", "Hiç alakam yok"] },
        { id: "power", q: "Hangi süper güce sahip olmak isterdin?", opts: ["Uçmak", "Görünmezlik", "Zihin Okuma", "Zamanı Durdurma"] }
    ];

    function toRegister() {
        document.getElementById('loginStep').style.display = 'none';
        document.getElementById('regStep1').style.display = 'block';
    }

    function toTest() {
        const n = document.getElementById('rName').value;
        const e = document.getElementById('rEmail').value;
        const p = document.getElementById('rPass').value;
        const g = document.getElementById('rGender').value;
        const b = document.getElementById('rBirth').value;

        if(!n || !e || !p || !g || !b) { 
            alert("Lütfen tüm alanları doldur kanka!"); 
            return; 
        }

        // --- 18 YAŞ KONTROLÜ ---
        const birthDate = new Date(b);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }

        if (age < 18) {
            alert("Üzgünüz, UpDate'e katılmak için 18 yaşından büyük olmalısın! 🔞");
            return;
        }
        
        document.getElementById('regStep1').style.display = 'none';
        document.getElementById('regStep2').style.display = 'block';
        document.getElementById('mainBox').classList.add('wide');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQ];
        let html = `
            <div class="question-card active">
                <div style="color:#888; margin-bottom:10px;">Soru ${currentQ + 1}/10</div>
                <div class="q-title">${q.q}</div>
                <div class="options-grid">
                    ${q.opts.map(opt => `<button class="opt-btn" onclick="selectOpt('${q.id}', '${opt}')">${opt}</button>`).join('')}
                </div>
            </div>`;
        document.getElementById('testArea').innerHTML = html;
    }

    function selectOpt(qId, val) {
        answers[qId] = val;
        if(currentQ < questions.length - 1) {
            currentQ++;
            setTimeout(showQuestion, 300);
        } else {
            document.getElementById('testArea').innerHTML = `<div class="q-title">Harika! Algoritmamız seni tanıdı. 🔥</div>`;
            document.getElementById('finishBtn').style.display = 'block';
        }
    }

    async function completeRegister() {
        const data = {
            full_name: document.getElementById('rName').value,
            email: document.getElementById('rEmail').value,
            password: document.getElementById('rPass').value,
            gender: document.getElementById('rGender').value,
            birth_date: document.getElementById('rBirth').value,
            interests: Object.values(answers).join(', ')
        };

        const res = await fetch('http://localhost:5000/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if(res.ok) {
            alert("Hesabın oluşturuldu! Şimdi eşleşme zamanı.");
            location.reload();
        }
    }

    async function login() {
        const email = document.getElementById('lEmail').value;
        const password = document.getElementById('lPass').value;
        const res = await fetch('http://localhost:5000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const d = await res.json();
        if (d.success) { 
            localStorage.setItem('loggedInUserId', d.user.id); 
            window.location.href = 'index.html'; 
        } else { 
            alert("Giriş başarısız, bilgilerini kontrol et kanka!"); 
        }
    }
</script>
</body>
</html>
