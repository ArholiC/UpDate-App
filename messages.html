<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpDate - Mesajlar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Poppins', sans-serif; background: #0b0914; color: white; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; position: relative;
        }

        /* ARKA PLAN NEBULA */
        body::before {
            content: ""; position: absolute; width: 600px; height: 600px;
            border-radius: 50%; background: linear-gradient(45deg, #ff416c, #ff4b2b);
            filter: blur(120px); opacity: 0.1; z-index: -1;
        }

        .container { 
            width: 750px; height: 85vh; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(35px); 
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); position: relative;
            display: flex; flex-direction: column; padding: 40px; box-sizing: border-box;
        }

        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .title { font-size: 38px; font-weight: 800; background: linear-gradient(to right, #ff416c, #ff4b2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .match-badge { background: rgba(255, 75, 75, 0.2); color: #ff4b4b; padding: 8px 20px; border-radius: 50px; font-weight: 600; font-size: 14px; }

        .chat-list { flex: 1; overflow-y: auto; padding-right: 15px; margin-bottom: 40px; }
        .chat-list::-webkit-scrollbar { width: 6px; }
        .chat-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .chat-item { 
            display: flex; align-items: center; gap: 20px; padding: 20px; 
            background: rgba(255, 255, 255, 0.03); border-radius: 30px; 
            text-decoration: none; color: white; margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .chat-item:hover { 
            transform: scale(1.02); 
            background: rgba(255, 255, 255, 0.08); 
            border-color: #ff4b4b; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .avatar-wrapper { position: relative; flex-shrink: 0; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #ff4b4b; }
        .status-dot { position: absolute; bottom: 3px; right: 3px; width: 14px; height: 14px; background: #4caf50; border: 2px solid #16142b; border-radius: 50%; }

        .chat-info { flex: 1; overflow: hidden; }
        .name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
        .name { font-weight: 700; font-size: 19px; letter-spacing: -0.5px; }
        .time { font-size: 11px; color: #666; }
        .preview { font-size: 13px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* NAVBAR */
        .navbar { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: rgba(22, 20, 43, 0.9); display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 0 0 50px 50px; backdrop-filter: blur(15px);
        }
        .nav-link { color: #555; text-decoration: none; font-size: 12px; font-weight: 600; text-align: center; }
        .nav-link.active { color: #ff4b4b; }
        .nav-icon { display: block; font-size: 24px; margin-bottom: 3px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-area">
        <h1 class="title">Mesajlar</h1>
        <div class="match-badge" id="matchBadge">0 Eşleşme</div>
    </div>

    <div class="chat-list" id="chatList">
        <div style="text-align:center; color:#444; margin-top:100px;">Eşleşmeler aranıyor...</div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-link"><span class="nav-icon">🔥</span>Keşfet</a>
        <a href="messages.html" class="nav-link active"><span class="nav-icon">💬</span>Mesajlar</a>
        <a href="profile.html" class="nav-link"><span class="nav-icon">👤</span>Profil</a>
    </nav>
</div>

<script>
    const benimID = localStorage.getItem('loggedInUserId');
    if(!benimID) window.location.href = 'login.html';

    async function listeyiYukle() {
        try {
            // FIX: /api/matches/${benimID} şeklinde senin ID'ni de gönderiyoruz
            const res = await fetch(`http://localhost:5005/api/matches/${benimID}`);
            
            if(!res.ok) {
                document.getElementById('chatList').innerHTML = '<p style="text-align:center; color:#666;">Sunucu cevabı alınamadı.</p>';
                return;
            }

            const veriler = await res.json();
            
            document.getElementById('matchBadge').innerText = `${veriler.length} Eşleşme`;
            
            const listContainer = document.getElementById('chatList');
            if(!veriler || veriler.length === 0) {
                listContainer.innerHTML = `
                    <div style="text-align:center; margin-top:80px;">
                        <div style="font-size:50px; margin-bottom:20px;">🏜️</div>
                        <p style="color:#666; font-size:16px;">Henüz yeni bir eşleşme yok.<br>Kaydırmaya devam et!</p>
                        <a href="index.html" style="color:#ff4b4b; text-decoration:none; font-weight:700;">Keşfet'e Dön →</a>
                    </div>`;
                return;
            }

            listContainer.innerHTML = veriler.map(kisi => {
                const pic = kisi.profile_pic 
                    ? 'http://localhost:5005' + kisi.profile_pic 
                    : `https://ui-avatars.com/api/?name=${encodeURIComponent(kisi.full_name)}&background=random&color=fff&size=128`;

                return `
                <a href="chat.html?id=${kisi.id}" class="chat-item">
                    <div class="avatar-wrapper">
                        <img src="${pic}" class="avatar" onerror="this.src='https://via.placeholder.com/80'">
                        <div class="status-dot"></div>
                    </div>
                    <div class="chat-info">
                        <div class="name-row">
                            <div class="name">${kisi.full_name}</div>
                            <div class="time">Şimdi</div>
                        </div>
                        <div class="preview">${kisi.bio ? (kisi.bio.length > 45 ? kisi.bio.substring(0, 45) + '...' : kisi.bio) : 'Harika bir eşleşme! İlk mesajı sen at. ✨'}</div>
                    </div>
                </a>
                `;
            }).join('');
        } catch (err) {
            console.error("Liste yükleme hatası:", err);
            document.getElementById('chatList').innerHTML = '<p style="text-align:center; color:red;">Sunucuya bağlanılamadı!</p>';
        }
    }

    // İlk yükleme
    listeyiYukle();
    
    // 15 saniyede bir güncelle
    setInterval(listeyiYukle, 15000);
</script>
</body>
</html>
