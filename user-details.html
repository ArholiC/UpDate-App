<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UpDate - Profil Detayları</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0b0914; color: white; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; overflow-x: hidden; position: relative;
        }

        body::before {
            content: ""; position: absolute; width: 500px; height: 500px;
            border-radius: 50%; background: linear-gradient(45deg, #ff416c, #ff4b2b);
            filter: blur(100px); opacity: 0.12; z-index: -1; top: 10%; left: 10%;
        }

        .container { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 40px; 
            width: 420px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.7); 
        }

        .detay-foto { 
            width: 150px; height: 150px; border-radius: 50%; 
            object-fit: cover; margin-bottom: 20px;
            border: 4px solid #ff4b4b; box-shadow: 0 10px 25px rgba(255, 75, 75, 0.3);
        }

        h2 { font-size: 32px; font-weight: 800; margin-bottom: 5px; }
        .yas-burc { color: #888; font-size: 16px; margin-bottom: 20px; }
        
        .uyum-kutusu { margin: 25px 0; }
        .uyum-yuzdesi {
            font-size: 48px; font-weight: 800; color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        .uyum-etiket { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        .biyo { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; font-size: 14px; line-height: 1.6; color: #ccc; margin-bottom: 25px; min-height: 50px; }

        .hobi-etiketi { text-align: left; font-size: 12px; color: #ff4b4b; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; }
        .hobi-kapsayici { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .hobi { background: rgba(255,255,255,0.08); padding: 8px 15px; border-radius: 50px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .hobi.ortak { background: rgba(0, 255, 136, 0.1); border-color: #00ff88; color: #00ff88; }

        .btn-don { 
            display: block; margin-top: 30px; padding: 15px; 
            background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; text-decoration: none;
            border-radius: 20px; font-weight: 700; transition: 0.3s;
        }
        .btn-don:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3); }
    </style>
</head>
<body>

<div class="container" id="detayPaneli">
    <img src="" id="userFoto" class="detay-foto">
    <h2 id="userName">Yükleniyor...</h2>
    <div class="yas-burc" id="userYasBurc">...</div>

    <div class="uyum-kutusu">
        <div class="uyum-etiket">Algoritma Uyumu</div>
        <div class="uyum-yuzdesi" id="uyumYuzdesi">%0</div>
    </div>

    <div class="biyo" id="userBio">...</div>

    <div class="hobi-etiketi">İlgi Alanları</div>
    <div class="hobi-kapsayici" id="userHobbies"></div>

    <a href="index.html" class="btn-don">← Geri Dön</a>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const hedefID = params.get('id');
    const benimID = localStorage.getItem('loggedInUserId');

    async function detaylariGetir() {
        try {
            // 1. Verileri Çek
            const [res1, res2] = await Promise.all([
                fetch(`http://localhost:5000/api/users/${hedefID}`),
                fetch(`http://localhost:5000/api/users/${benimID}`)
            ]);
            
            const hedefUser = await res1.json();
            const ben = await res2.json();

            // 2. Temel Bilgileri Yaz
            document.getElementById('userName').innerText = hedefUser.full_name;
            document.getElementById('userFoto').src = hedefUser.profile_pic 
                ? `http://localhost:5000${hedefUser.profile_pic}` 
                : `https://ui-avatars.com/api/?name=${encodeURIComponent(hedefUser.full_name)}&background=random&color=fff&size=200`;
            document.getElementById('userBio').innerText = hedefUser.bio || "Henüz bir biyografi eklenmemiş.";

            if(hedefUser.birth_date) {
                let yas = new Date().getFullYear() - new Date(hedefUser.birth_date).getFullYear();
                document.getElementById('userYasBurc').innerText = `${yas} Yaşında • ${hedefUser.zodiac || 'Burç Belirtilmemiş'}`;
            }

            // 3. UYUM HESAPLAMA (BACKEND ALGORİTMASI İLE AYNI)
            const hedefHobiler = hedefUser.interests ? hedefUser.interests.split(',').map(h => h.trim()) : [];
            const benimHobiler = ben.interests ? ben.interests.split(',').map(h => h.trim()) : [];
            
            // Ortak hobileri bul
            const ortak = hedefHobiler.filter(h => benimHobiler.includes(h));
            
            // Yüzde Hesapla (Jaccard Benzerliği)
            let matchRate = 0;
            if (benimHobiler.length > 0 || hedefHobiler.length > 0) {
                const birlesim = new Set([...benimHobiler, ...hedefHobiler]);
                matchRate = Math.round((ortak.length / birlesim.size) * 100);
            }
            
            document.getElementById('uyumYuzdesi').innerText = `%${matchRate}`;

            // 4. Hobileri Listele (Ortak olanları yeşil yak)
            const hobiKapsayici = document.getElementById('userHobbies');
            if(hedefHobiler.length > 0) {
                hobiKapsayici.innerHTML = hedefHobiler.map(h => {
                    const isOrtak = benimHobiler.includes(h) ? 'ortak' : '';
                    return `<div class="hobi ${isOrtak}">${h}</div>`;
                }).join('');
            } else {
                hobiKapsayici.innerHTML = '<div style="font-size:12px; color:#555">İlgi alanı belirtilmemiş.</div>';
            }

        } catch (error) {
            console.error("Hata:", error);
        }
    }

    detaylariGetir();
</script>
</body>
</html>
