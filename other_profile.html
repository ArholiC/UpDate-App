<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UpDate - Profil</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { 
            font-family: 'Poppins', sans-serif; background: #0b0914; color: white; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
        }
        .container { 
            width: 450px; height: 85vh; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px); 
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px;
            display: flex; flex-direction: column; align-items: center; text-align: center; position: relative;
        }
        .back-btn { position: absolute; top: 30px; left: 30px; color: white; text-decoration: none; font-size: 24px; }
        .profile-pic { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid #ff416c; margin-top: 20px; box-shadow: 0 0 30px rgba(255, 65, 108, 0.3); }
        h2 { margin: 20px 0 5px; font-size: 28px; font-weight: 800; }
        .zodiac-tag { background: rgba(255, 255, 255, 0.1); padding: 5px 15px; border-radius: 20px; font-size: 13px; color: #ff4b2b; font-weight: 600; }
        .bio-section { margin-top: 30px; background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 25px; width: 100%; box-sizing: border-box; }
        .interest-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
        .tag { background: linear-gradient(45deg, #ff416c, #ff4b2b); padding: 6px 14px; border-radius: 15px; font-size: 12px; font-weight: 600; }
        .chat-btn { margin-top: auto; background: white; color: #0b0914; width: 100%; padding: 15px; border-radius: 25px; text-decoration: none; font-weight: 800; transition: 0.3s; }
        .chat-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="container">
    <a href="javascript:history.back()" class="back-btn">←</a>
    <img id="pPic" src="" class="profile-pic">
    <h2 id="pName">Yükleniyor...</h2>
    <div id="pZodiac" class="zodiac-tag">Burç Belirtilmemiş</div>

    <div class="bio-section">
        <p id="pBio" style="font-size: 14px; color: #ccc; line-height: 1.6; margin: 0;">Henüz bir biyografi eklememiş.</p>
    </div>

    <div class="interest-tags" id="pInterests"></div>

    <a href="#" id="pChatLink" class="chat-btn">Mesaj Gönder</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    async function profilDetayGetir() {
        try {
            const res = await fetch(`http://localhost:5000/api/users/${userId}`);
            const user = await res.json();

            document.getElementById('pName').innerText = user.full_name;
            document.getElementById('pBio').innerText = user.bio || "Sessizliği seviyor galiba...";
            document.getElementById('pZodiac').innerText = user.zodiac || "Burç Bilgisi Yok";
            document.getElementById('pChatLink').href = `/chat.html?id=${user.id}`;
            
            const pic = user.profile_pic 
                ? 'http://localhost:5000' + user.profile_pic 
                : `https://ui-avatars.com/api/?name=${encodeURIComponent(user.full_name)}&background=random&color=fff&size=200`;
            document.getElementById('pPic').src = pic;

            if(user.interests) {
                const hobiBox = document.getElementById('pInterests');
                hobiBox.innerHTML = user.interests.split(',').map(h => `<span class="tag">${h.trim()}</span>`).join('');
            }
        } catch (err) { console.error("Profil yüklenirken hata oluştu."); }
    }

    profilDetayGetir();
</script>
</body>
</html>
