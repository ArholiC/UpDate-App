<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UpDate - Profilim</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0b0914; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; position: relative; }
        
        body::before { content: ""; position: absolute; width: 600px; height: 600px; border-radius: 50%; background: linear-gradient(45deg, #ff416c, #ff4b2b); filter: blur(150px); opacity: 0.1; z-index: -1; }

        .container { 
            width: 750px; height: 85vh; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px); 
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); position: relative;
            display: flex; flex-direction: column; padding: 40px 60px; box-sizing: border-box;
        }

        .scroll-content { flex: 1; overflow-y: auto; padding-right: 20px; margin-bottom: 70px; scroll-behavior: smooth; }
        .scroll-content::-webkit-scrollbar { width: 8px; }
        .scroll-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .profile-pic-section { text-align: center; margin-bottom: 30px; position: relative; }
        .foto-alani { 
            background: linear-gradient(45deg, #ff416c, #ff4b2b); height: 180px; width: 180px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 70px; margin: 0 auto 15px auto; border: 5px solid #0b0914; 
            cursor: pointer; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: 0.4s;
        }
        .foto-alani:hover { transform: scale(1.05) rotate(3deg); }
        .foto-alani img { width: 100%; height: 100%; object-fit: cover; }
        
        .yukle-btn { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 50px; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .yukle-btn:hover { background: #ff4b4b; color: white; }

        h2 { font-size: 40px; font-weight: 800; margin: 15px 0 5px 0; letter-spacing: -1.5px; }
        .mail { color: #666; font-size: 16px; margin-bottom: 30px; }

        .label-text { text-align: left; font-weight: 700; color: #ff4b4b; font-size: 13px; text-transform: uppercase; margin: 25px 0 10px 10px; letter-spacing: 1px; }
        
        textarea, select, .kilitli-box { 
            width: 100%; padding: 20px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; 
            color: white; font-family: inherit; font-size: 16px; outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: #ff4b4b; background: rgba(255,255,255,0.08); box-shadow: 0 0 20px rgba(255,75,75,0.1); }

        .hobi-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 10px 0; }
        .hobi-box { display: none; }
        .hobi-item { 
            background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); 
            padding: 12px 24px; border-radius: 50px; font-size: 14px; cursor: pointer; transition: 0.3s;
            font-weight: 500;
        }
        .hobi-box:checked + .hobi-item { background: rgba(255, 65, 108, 0.2); border-color: #ff416c; color: #ff416c; transform: translateY(-3px); }

        .btn-main { background: linear-gradient(90deg, #ff416c, #ff4b2b); color: white; border: none; padding: 22px; border-radius: 25px; width: 100%; font-weight: 800; font-size: 18px; cursor: pointer; margin-top: 30px; box-shadow: 0 15px 30px rgba(255, 75, 75, 0.3); transition: 0.3s; }
        .btn-main:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(255, 75, 75, 0.5); }

        .navbar { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(22, 20, 43, 0.8); display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid rgba(255,255,255,0.1); border-radius: 0 0 50px 50px; }
        .nav-link { color: #555; text-decoration: none; font-size: 13px; font-weight: 600; text-align: center; }
        .nav-link.active { color: #ff4b4b; }
    </style>
</head>
<body>
<div class="container">
    <div class="scroll-content">
        <div class="profile-pic-section">
            <label for="dosyaInput" class="foto-alani">
                <span id="placeholder">👤</span>
                <img id="previewImg" src="" style="display:none;">
            </label>
            <input type="file" id="dosyaInput" style="display:none;" onchange="handleImage(this)">
            <span class="yukle-btn" onclick="document.getElementById('dosyaInput').click()">📸 Fotoğrafı Değiştir</span>
        </div>

        <h2 id="userName">...</h2>
        <p class="mail" id="userEmail">...</p>
        
        <input type="hidden" id="finalPicPath">

        <div class="label-text">Biyografin</div>
        <textarea id="bioBox" rows="4" placeholder="Seni diğerlerinden ayıran ne? Buraya yaz..."></textarea>
        
        <div style="display:flex; gap:20px; margin-top:10px;">
            <div style="flex:1;">
                <div class="label-text">Cinsiyet</div>
                <select id="genderBox" disabled><option value="erkek">Erkek</option><option value="kadin">Kadın</option></select>
            </div>
            <div style="flex:1;">
                <div class="label-text">Doğum Tarihi</div>
                <div class="kilitli-box" id="birthBox" style="text-align:center;">01.01.2000</div>
            </div>
        </div>

        <div class="label-text">İlgi Alanların</div>
        <div class="hobi-container" id="hobiGrid"></div>
        
        <button class="btn-main" onclick="updateProfile()">Değişiklikleri Kaydet</button>
        
        <div style="margin-top:40px; display:flex; justify-content:center; gap:20px;">
            <button onclick="localStorage.clear(); location.href='login.html'" style="background:none; border:none; color:#666; font-weight:600; cursor:pointer;">Çıkış Yap</button>
            <button onclick="deleteAccount()" style="background:none; border:none; color:#ff4b4b; font-weight:600; cursor:pointer;">Hesabı Sil</button>
        </div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-link"><span class="nav-icon">🔥</span>Keşfet</a>
        <a href="messages.html" class="nav-link"><span class="nav-icon">💬</span>Mesajlar</a>
        <a href="profile.html" class="nav-link active"><span class="nav-icon">👤</span>Profil</a>
    </nav>
</div>

<script>
    const bID = localStorage.getItem('loggedInUserId');
    const hList = ["💻 Yazılım", "🎮 Oyun", "🎨 Çizim", "🎬 Sinema", "🎵 Müzik", "🏋️ Spor", "📚 Kitap", "✈️ Seyahat", "🐾 Hayvanlar", "📷 Fotoğraf", "🍳 Yemek", "🎸 Enstrüman", "🧘 Yoga", "🎭 Tiyatro", "🌌 Astronomi", "☕ Kahve", "⚽ Futbol", "🧪 Bilim", "🎲 Masa Oyunları"];

    function initHobbies() {
        const grid = document.getElementById('hobiGrid');
        grid.innerHTML = hList.map(h => {
            const id = h.replace(/[^a-z]/gi,'');
            return `<div><input type="checkbox" class="hobi-box" id="${id}" value="${h}"><label class="hobi-item" for="${id}">${h}</label></div>`;
        }).join('');
    }

    async function loadData() {
        const res = await fetch(`http://localhost:5000/api/users/${bID}`);
        const u = await res.json();
        document.getElementById('userName').innerText = u.full_name;
        document.getElementById('userEmail').innerText = u.email;
        document.getElementById('bioBox').value = u.bio || '';
        document.getElementById('genderBox').value = u.gender;
        if(u.birth_date) document.getElementById('birthBox').innerText = new Date(u.birth_date).toLocaleDateString('tr-TR');
        if(u.interests) {
            document.querySelectorAll('.hobi-box').forEach(b => { if(u.interests.includes(b.value)) b.checked = true; });
        }
        if(u.profile_pic) {
            const img = document.getElementById('previewImg');
            img.src = `http://localhost:5000${u.profile_pic}`;
            img.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('finalPicPath').value = u.profile_pic;
        }
    }

    async function handleImage(input) {
        const fd = new FormData(); fd.append("profil_resmi", input.files[0]);
        const res = await fetch('http://localhost:5000/api/upload', { method: 'POST', body: fd });
        const d = await res.json();
        if(d.success) {
            document.getElementById('finalPicPath').value = d.url;
            document.getElementById('previewImg').src = `http://localhost:5000${d.url}`;
            document.getElementById('previewImg').style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
        }
    }

    async function updateProfile() {
        const hobs = Array.from(document.querySelectorAll('.hobi-box:checked')).map(b => b.value);
        await fetch(`http://localhost:5000/api/users/${bID}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ bio: document.getElementById('bioBox').value, interests: hobs.join(','), profile_pic: document.getElementById('finalPicPath').value })
        });
        alert("Profil başarıyla güncellendi! 🔥");
    }

    async function deleteAccount() {
        if(confirm("Dönüşü yok kanka, sileyim mi?")) {
            await fetch(`http://localhost:5000/api/users/${bID}`, { method: 'DELETE' });
            localStorage.clear(); location.href = 'login.html';
        }
    }

    initHobbies(); loadData();
</script>
</body>
</html>
