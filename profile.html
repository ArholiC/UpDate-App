<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UpDate - Profilim</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0b0914; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; position: relative; }
        body::before { content: ""; position: absolute; width: 600px; height: 600px; border-radius: 50%; background: linear-gradient(45deg, #ff416c, #ff4b2b); filter: blur(150px); opacity: 0.1; z-index: -1; }

        .container { 
            width: 750px; height: 85vh; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px); 
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); position: relative;
            display: flex; flex-direction: column; padding: 40px 60px; box-sizing: border-box;
        }

        .scroll-content { flex: 1; overflow-y: auto; padding-right: 10px; margin-bottom: 70px; scroll-behavior: smooth; }
        .scroll-content::-webkit-scrollbar { width: 6px; }
        .scroll-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .profile-pic-section { text-align: center; margin-bottom: 20px; position: relative; }
        .foto-alani { 
            background: linear-gradient(45deg, #ff416c, #ff4b2b); height: 160px; width: 160px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 60px; margin: 0 auto 15px auto; border: 5px solid #0b0914; 
            cursor: pointer; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: 0.4s;
        }
        .foto-alani:hover { transform: scale(1.05); }
        .foto-alani img { width: 100%; height: 100%; object-fit: cover; }
        
        .yukle-btn { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 50px; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .yukle-btn:hover { background: #ff4b4b; color: white; }

        h2 { font-size: 36px; font-weight: 800; margin: 10px 0 0 0; letter-spacing: -1px; }
        .mail { color: #666; font-size: 14px; margin-bottom: 20px; }

        .label-text { text-align: left; font-weight: 700; color: #ff4b4b; font-size: 12px; text-transform: uppercase; margin: 20px 0 8px 5px; letter-spacing: 1px; }
        
        textarea, select, .kilitli-box { 
            width: 100%; padding: 15px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; 
            color: white; font-family: inherit; font-size: 14px; outline: none; transition: 0.3s;
        }

        /* HOBİ TASARIMI DÜZELTME */
        .hobi-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 5px 0; }
        .hobi-box { display: none; }
        .hobi-item { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            padding: 8px 16px; border-radius: 50px; font-size: 12px; cursor: pointer; transition: 0.2s;
            font-weight: 500; color: #888;
        }
        .hobi-box:checked + .hobi-item { 
            background: rgba(255, 65, 108, 0.2); border-color: #ff416c; color: white; 
            box-shadow: 0 0 15px rgba(255, 65, 108, 0.2);
        }

        .btn-main { background: linear-gradient(90deg, #ff416c, #ff4b2b); color: white; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .btn-main:hover { transform: translateY(-2px); opacity: 0.9; }

        .navbar { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(22, 20, 43, 0.9); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); border-radius: 0 0 50px 50px; backdrop-filter: blur(10px); }
        .nav-link { color: #555; text-decoration: none; font-size: 12px; font-weight: 600; text-align: center; }
        .nav-link.active { color: #ff4b4b; }
    </style>
</head>
<body>
<div class="container">
    <div class="scroll-content">
        <div class="profile-pic-section">
            <label for="dosyaInput" class="foto-alani">
                <span id="placeholder">👤</span>
                <img id="previewImg" src="" style="display:none;">
            </label>
            <input type="file" id="dosyaInput" style="display:none;" onchange="handleImage(this)">
            <span class="yukle-btn" onclick="document.getElementById('dosyaInput').click()">📸 Fotoğrafı Değiştir</span>
        </div>

        <h2 id="userName">Yükleniyor...</h2>
        <p class="mail" id="userEmail">...</p>
        <input type="hidden" id="finalPicPath">

        <div class="label-text">Biyografin</div>
        <textarea id="bioBox" rows="3" placeholder="Seni diğerlerinden ayıran ne?"></textarea>
        
        <div style="display:flex; gap:15px;">
            <div style="flex:1;"><div class="label-text">Cinsiyet</div><select id="genderBox" disabled><option value="erkek">Erkek</option><option value="kadin">Kadın</option></select></div>
            <div style="flex:1;"><div class="label-text">Doğum Tarihi</div><div class="kilitli-box" id="birthBox" style="background: rgba(255,255,255,0.02); color: #666;">...</div></div>
        </div>

        <div class="label-text">İlgi Alanların (Seçtiklerin Parlar 🔥)</div>
        <div class="hobi-container" id="hobiGrid"></div>
        
        <button class="btn-main" onclick="updateProfile()">Değişiklikleri Kaydet 🔥</button>
        
        <div style="margin-top:30px; display:flex; justify-content:space-between; align-items:center; padding-bottom: 20px;">
            <button onclick="deleteProfile()" style="background:rgba(255,75,75,0.1); border:1px solid rgba(255,75,75,0.3); color:#ff4b4b; cursor:pointer; font-size: 13px; padding: 10px 20px; border-radius: 15px; font-weight: 600; transition: 0.3s;" onmouseover="this.style.background='rgba(255,75,75,0.2)'" onmouseout="this.style.background='rgba(255,75,75,0.1)'">🗑️ Hesabımı Sil</button>
            <button onclick="localStorage.clear(); location.href='login.html'" style="background:none; border:none; color:#888; cursor:pointer; font-size: 13px; padding: 10px; font-weight: 600;">Çıkış Yap</button>
        </div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-link">🔥 Keşfet</a>
        <a href="messages.html" class="nav-link">💬 Mesajlar</a>
        <a href="profile.html" class="nav-link active">👤 Profil</a>
    </nav>
</div>

<script>
    const bID = localStorage.getItem('loggedInUserId');
    const hList = ["💻 Yazılım", "🎮 Oyun", "🎨 Çizim", "🎬 Sinema", "🎵 Müzik", "🏋️ Spor", "📚 Kitap", "✈️ Seyahat", "🐾 Hayvanlar", "📷 Fotoğraf", "🍳 Yemek", "🎸 Enstrüman", "🧘 Yoga"];

    function initHobbies(userInterests = "") {
        const grid = document.getElementById('hobiGrid');
        const userHobbies = userInterests ? userInterests.split(',').map(i => i.trim()) : [];
        
        grid.innerHTML = hList.map(h => {
            const safeId = h.replace(/[^a-z0-9]/gi,'');
            const isChecked = userHobbies.includes(h) ? "checked" : "";
            return `<div>
                <input type="checkbox" class="hobi-box" id="${safeId}" value="${h}" ${isChecked}>
                <label class="hobi-item" for="${safeId}">${h}</label>
            </div>`;
        }).join('');
    }

    async function loadData() {
        const res = await fetch(`http://localhost:5005/api/users/${bID}`);
        const u = await res.json();
        document.getElementById('userName').innerText = u.full_name;
        document.getElementById('userEmail').innerText = u.email;
        document.getElementById('bioBox').value = u.bio || '';
        document.getElementById('genderBox').value = u.gender;
        if(u.birth_date) document.getElementById('birthBox').innerText = new Date(u.birth_date).toLocaleDateString('tr-TR');
        
        initHobbies(u.interests); // Hobileri seçili getir
        
        if(u.profile_pic) {
            const img = document.getElementById('previewImg');
            img.src = `http://localhost:5005${u.profile_pic}`;
            img.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('finalPicPath').value = u.profile_pic;
        }
    }

    async function handleImage(input) {
        if(!input.files[0]) return;
        const fd = new FormData(); fd.append("profil_resmi", input.files[0]);
        const res = await fetch('http://localhost:5005/api/upload', { method: 'POST', body: fd });
        const d = await res.json();
        if(d.success) {
            document.getElementById('finalPicPath').value = d.url;
            document.getElementById('previewImg').src = `http://localhost:5005${d.url}`;
            document.getElementById('previewImg').style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
            
            // Anında veritabanına kaydet
            const hobs = Array.from(document.querySelectorAll('.hobi-box:checked')).map(b => b.value);
            await fetch(`http://localhost:5005/api/users/${bID}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    bio: document.getElementById('bioBox').value, 
                    interests: hobs.join(', '), 
                    profile_pic: d.url 
                })
            });
        }
    }

    async function updateProfile() {
        const hobs = Array.from(document.querySelectorAll('.hobi-box:checked')).map(b => b.value);
        if(hobs.length < 3) return alert("Kanka en az 3 hobi seçmen lazım!");

        const res = await fetch(`http://localhost:5005/api/users/${bID}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                bio: document.getElementById('bioBox').value, 
                interests: hobs.join(', '), 
                profile_pic: document.getElementById('finalPicPath').value 
            })
        });
        if(res.ok) alert("Profil güncellendi! 🔥");
    }

    async function deleteProfile() {
        if(confirm("Hesabını kalıcı olarak silmek istediğine emin misin? Bu işlem geri alınamaz! 😢")) {
            const res = await fetch(`http://localhost:5005/api/users/${bID}`, { method: 'DELETE' });
            if(res.ok) {
                alert("Hesabın başarıyla silindi. Seni özleyeceğiz! 👋");
                localStorage.clear();
                location.href = 'login.html';
            } else {
                alert("Silme işlemi başarısız oldu.");
            }
        }
    }

    loadData();
</script>
</body>
</html>
