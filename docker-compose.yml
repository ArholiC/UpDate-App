version: '3.8'

services:
  app:
    build: .
    ports:
      - "5005:5000"
    environment:
      - PORT=5000
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - DB_HOST=db  # Veritabanı servisinin adı
      - DB_PORT=5432
      - DB_NAME=update_db
      - JWT_SECRET=update_ozel_anahtar_99
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: update_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d update_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
